name: Flutter CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  analyze-test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5
      - uses: subosito/flutter-action@v3
        with:
          channel: stable
      - run: flutter pub get
      - run: flutter analyze
      - run: flutter test
